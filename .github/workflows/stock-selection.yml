name: Stock Selection

on:
  schedule:
    # Wake at 16:30 Beijing time and let the gate run once every three UTC days.
    - cron: "30 8 * * *"
  workflow_dispatch:
    inputs:
      report_period:
        description: "Optional report period (YYYY-MM-DD); blank = latest legally visible"
        required: false
        type: string
      financial_updates:
        description: "Maximum missing financial records to fetch; 0 = all"
        required: false
        default: "100"
        type: string
      no_push:
        description: "Skip PushPlus notification"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: stock-selection
  cancel-in-progress: false

jobs:
  select:
    # Chinese market-data endpoints reset connections from GitHub-hosted runners.
    # Keep this job on the registered Windows machine and its persistent workspace.
    runs-on: [self-hosted, Windows, X64, my-trade]
    timeout-minutes: 720
    env:
      PYTHONUNBUFFERED: "1"
      PYTHONIOENCODING: "utf-8"
      PSExecutionPolicyPreference: Bypass
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
      LOCAL_PROJECT_ROOT: 'D:\MyCodes\my_trade'
      PYTHON_BIN: 'D:\ActionsRunner\my-trade\python\python.exe'

    steps:
      - name: Three-day schedule gate
        id: gate
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          if ("${{ github.event_name }}" -ne "schedule") {
            "run=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            $epochDay = [math]::Floor(([DateTimeOffset]::UtcNow.ToUnixTimeSeconds()) / 86400)
            $shouldRun = (($epochDay % 3) -eq 0).ToString().ToLowerInvariant()
            "run=$shouldRun" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          # Preserve ignored var/cache data between jobs on this persistent runner.
          clean: false

      - name: Verify Python runtime
        if: steps.gate.outputs.run == 'true'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          & $env:PYTHON_BIN -c "import akshare, baostock, duckdb, numpy, openpyxl, pandas, pytest, pytz, requests; print('Python runtime ready')"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run tests
        if: steps.gate.outputs.run == 'true'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          & $env:PYTHON_BIN -m pytest -q
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Seed persistent cache
        if: steps.gate.outputs.run == 'true'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        run: |
          $source = Join-Path $env:LOCAL_PROJECT_ROOT "var\cache"
          $target = Join-Path $env:GITHUB_WORKSPACE "var\cache"
          $marker = Join-Path $target "stock_universe.csv"
          if (-not (Test-Path $marker) -and (Test-Path $source)) {
            New-Item -ItemType Directory -Force -Path $target | Out-Null
            Copy-Item -Path (Join-Path $source "*") -Destination $target -Recurse -Force
            Write-Host "Seeded runner cache from $source"
          } else {
            Write-Host "Using persistent runner cache at $target"
          }

      - name: Run full-market selection
        if: steps.gate.outputs.run == 'true'
        shell: powershell -NoProfile -ExecutionPolicy Bypass -File {0}
        env:
          INPUT_REPORT_PERIOD: ${{ inputs.report_period }}
          INPUT_FINANCIAL_UPDATES: ${{ inputs.financial_updates }}
          INPUT_NO_PUSH: ${{ inputs.no_push }}
        run: |
          if ($env:INPUT_REPORT_PERIOD) {
            $env:REPORT_PERIOD = $env:INPUT_REPORT_PERIOD
          }
          $env:FINANCIAL_UPDATES = if ($env:INPUT_FINANCIAL_UPDATES) {
            $env:INPUT_FINANCIAL_UPDATES
          } else {
            "100"
          }
          if ($env:INPUT_NO_PUSH -eq "true" -or -not $env:PUSHPLUS_TOKEN) {
            $env:NO_PUSH = "1"
          }
          .\scripts\run_daily_analysis.ps1

      - name: Upload reports and logs
        if: always() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: stock-selection-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            var/logs/
            var/exports/
            var/cache/fundamental_snapshots/latest_coverage.json
            var/cache/fundamental_snapshots/*.meta.json
